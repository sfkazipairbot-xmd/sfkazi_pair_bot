<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sfkazipairbot-xmd</title>

<style>

body{
background:#0d0d0d;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 25px #00ffcc;
}

img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:20px;
border:4px solid #00ffcc;
}

h1{
color:#00ffcc;
margin-bottom:20px;
}

input{
width:90%;
padding:15px;
border:none;
border-radius:10px;
margin-top:15px;
font-size:18px;
outline:none;
}

button{
width:95%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#00ffcc;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00ccaa;
}

#code{
margin-top:20px;
font-size:22px;
color:#00ffcc;
font-weight:bold;
}

</style>

</head>
<body>

<div class="box">

<img src="https://i.postimg.cc/j2n3tM7R/IMG-20251125-003346-004.jpg">

<h1>sfkazipairbot-xmd</h1>

<input type="text" id="number" placeholder="Enter WhatsApp Number">

<button onclick="generateCode()">
Generate Pair Code
</button>

<div id="code"></div>

</div>

<script>

function generateCode(){

let number=document.getElementById("number").value;

if(number==""){
alert("Enter WhatsApp Number");
return;
}

let code=Math.floor(100000 + Math.random() * 900000);

document.getElementById("code").innerHTML=
"PAIR CODE: "+code;

}

</script>

</body>
</html>
